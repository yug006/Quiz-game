<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Game</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}



.container{
    background:white;
    padding:30px;
    width:400px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
}

#heading{
    margin-bottom:20px;
}

.answer{
    display:block;
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    background:#eee;
    cursor:pointer;
    border-radius:5px;
}

.answer:hover{
    background:#dcdcdc;
}

#Next-btn{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    background:#4CAF50;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<div id="quiz-header">
<h2 id="heading">Question will appear here</h2>
</div>

<div id="quiz-ans">
<button class="answer">Answer 1</button>
<button class="answer">Answer 2</button>
<button class="answer">Answer 3</button>
<button class="answer">Answer 4</button>
</div>
<span id="score"></span>
<button id="next-btn">Next</button>

</div>
<script src="script.js"></script>
</body>
</html>
